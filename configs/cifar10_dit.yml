project_name: diffusion-models
experiment_name: cifar10-dit-ddpm
model_type: dit
model_params:
  img_size: 32
  patch_size: 2
  in_channels: 3
  hidden_size: 384
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  dropout: 0.1
dataset: cifar10
data_root: "/data3/wangchangmiao/shenxy/PublicDataset/cifar10"
image_size: 32
conditional: true
num_classes: 10
num_timesteps: 1000
beta_start: 0.0001
beta_end: 0.02
beta_schedule: linear
loss_type: l2
num_inference_steps: 50
ddim_eta: 0.0
epochs: 300
batch_size: 128
num_workers: 4
learning_rate: 0.0001
weight_decay: 0.0
gradient_accumulation_steps: 1
use_ema: true
ema_decay: 0.9999
use_scheduler: true
scheduler_type: cosine
warmup_epochs: 10
save_dir: ./checkpoints
save_interval: 10
sample_dir: ./generated_images
sample_interval: 5
sample_start_epoch: 30
num_samples: 16
use_swanlab: true
distributed: false
world_size: 1
seed: 42

# GPU设置
# 单卡：指定具体的GPU ID (如 0, 1, 2, 等)
# 多卡：指定GPU ID列表 (如 [0, 1, 2, 3])
# 注意：--gpus 命令行参数会覆盖此配置
gpu_id: 0  # 单卡GPU ID，或多卡时为GPU列表
