project_name: diffusion-models
experiment_name: cifar10-unet-ddpm
model_type: unet
model_params:
  image_size: 32
  in_channels: 3
  model_channels: 128
  out_channels: 3
  num_res_blocks: 2
  attention_resolutions: [16, 8]
  dropout: 0.1
  channel_mult: [1, 2, 2, 2]
  use_attention: true
dataset: cifar10
data_root: "/data3/wangchangmiao/shenxy/PublicDataset/cifar10"
image_size: 32
conditional: true
num_classes: 10
diffusion_type: ddpm
num_timesteps: 1000
beta_start: 0.0001
beta_end: 0.02
beta_schedule: linear
loss_type: l2
num_inference_steps: 50
ddim_eta: 0.0
epochs: 200
batch_size: 128
num_workers: 4
learning_rate: 0.0002
weight_decay: 0.0
gradient_accumulation_steps: 1
use_ema: true
ema_decay: 0.9999
use_scheduler: true
scheduler_type: cosine
warmup_epochs: 10
save_dir: ./checkpoints
save_interval: 10
sample_dir: ./generated_images
sample_interval: 5
sample_start_epoch: 20
num_samples: 16
use_swanlab: true
distributed: false
world_size: 1
seed: 42
